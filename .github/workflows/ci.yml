name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --locked

      - name: Compile source files
        run: uv run python -m compileall src

      - name: Smoke test input loader
        run: uv run python -c "from failtale.main import get_inputs; print(sorted(get_inputs().keys()))"

