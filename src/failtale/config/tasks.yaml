select_hosts_task:
  description: >
    Review the following test report and failure message:
    Test Report: {test_report}
    Failure: {test_failure}
    
    Available hosts in the environment: {hosts_inventory}
    
    Determine the most relevant hostnames to investigate. Choose those that most likely match words from the test report.
  expected_output: >
    A comma-separated list of hostnames.
  agent: host_selector

collect_data_task:
  description: >
    Use the selected hostnames produced by select_hosts_task as the host list
    for this task.

    For each host, collect logs and system state following the priority rules below.

    ## Priority rules

    ### Hosts with role "server" — use Uyuni MCP FIRST
    1. Start by calling the Uyuni MCP tool with tool_name='list_tools' (no args
       needed) to discover all tools the Uyuni API exposes.
    2. Call the relevant Uyuni MCP tools to obtain: registered systems, activation
       keys, software channels, accepted salt keys, patches, events, service health,
       or any other resource the API provides.
    3. Only after exhausting Uyuni MCP tools, fall back to execute_remote_ssh_command
       for information not covered by the API (e.g. raw log tails, process lists,
       listening ports) using the predefined SSH commands from Components Config below.

    ### Hosts with other roles (minion, proxy, build_host) — use SSH only
    Execute the predefined SSH commands for each host's role as listed in Components Config.

    ## Configuration
    Components Config: {components_config}
    SSH Credentials:   {ssh_credentials}

    DO NOT just output JSON or describe what you would do — you MUST actually invoke
    the tools and report the real output returned by each call.
  expected_output: >
    The actual raw outputs retrieved from each host, clearly labelled by host and
    tool/command used. Uyuni MCP results must be listed before SSH fallback results
    for the server host.
  agent: data_collector

analyze_screenshot_task:
  description: >
    Review the screenshot taken at the moment of the test failure located at: {screenshot_path}
    
    Use your vision capabilities to extract any visible text, especially looking for:
    - Red error banners or popups
    - Form validation errors
    - The current page title or state
    
    Test Failure Context: {test_failure}
  expected_output: >
    A detailed text summary of the visual state of the application at the time of failure, explicitly quoting any visible error messages or unexpected UI elements.
  agent: screenshot_analyzer

analyze_failure_task:
  description: >
    Analyze the collected logs against the original test failure.
    Test Report: {test_report}
    Failure Message: {test_failure}
    
    Review the collected logs from the previous task. Look for exact word matches, errors, or anomalies.
  expected_output: >
    A concise root cause hint explaining why the test failed based on the logs, including facts and relevant log outputs. Format as markdown.
  agent: failure_analyst